<mhd-dropdown
  [(open)]="open"
  position="bottom-start"
  [minWidth]="minWidth()"
>
  <button
    mhdDropdownTrigger
    type="button"
    class="mhd-inline-select"
    [disabled]="disabled()"
  >
    <span>{{ selectedLabel() }}</span>
    <mhd-icon icon="fa-chevron-down" iconSet="fas" size="text-xs" />
  </button>

  <div mhdDropdownPanel class="mhd-inline-select__panel">
    <div class="mhd-inline-select__list" role="menu" aria-label="Inline select options">
      @for (option of options(); track option.value) {
        <button
          type="button"
          class="mhd-inline-select__option"
          [class.mhd-inline-select__option--selected]="option.value === value()"
          (click)="selectValue(option.value)"
        >
          {{ option.label }}
        </button>
      }
    </div>
  </div>
</mhd-dropdown>
