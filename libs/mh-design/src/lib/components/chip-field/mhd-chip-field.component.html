<div class="mhd-chip-field" [class.mhd-chip-field--disabled]="disabled()">
  @if (label()) {
    <span class="mhd-chip-field__label">{{ label() }}</span>
  }

  <button
    type="button"
    class="mhd-chip-field__surface"
    [disabled]="disabled()"
    (click)="handleFieldClick()"
  >
    @if (chips().length) {
      <span class="mhd-chip-field__chips">
        @for (chip of chips(); track chip.value) {
          <span class="mhd-chip-field__chip">
            <span class="mhd-chip-field__chip-label">{{ chip.label }}</span>

            <button
              type="button"
              class="mhd-chip-field__chip-remove"
              [attr.aria-label]="'Remove ' + chip.label"
              (click)="removeChip(chip.value, $event)"
            >
              <mhd-icon icon="fa-xmark" iconSet="fas" size="text-xs" />
            </button>
          </span>
        }
      </span>
    } @else {
      <span class="mhd-chip-field__placeholder">{{ placeholder() }}</span>
    }

    <span class="mhd-chip-field__end" aria-hidden="true">
      <mhd-icon icon="fa-chevron-down" iconSet="fas" size="text-xs" />
    </span>
  </button>
</div>
