<mhd-dropdown
  [(open)]="open"
  position="bottom-start"
  [minWidth]="minPanelWidth()"
>
  <div mhdDropdownTrigger>
    <span (click)="toggleOpen()">
      <mhd-select-trigger
        [label]="selectedOption()?.label ?? ''"
        [placeholder]="placeholder()"
        [open]="open()"
        [active]="open()"
        [compact]="compact()"
        [disabled]="disabled()"
        [tone]="tone()"
      >
        @if (selectedOption()?.leadingLabel) {
          <span
            mhdSelectTriggerStart
            class="mhd-select__leading-badge"
            [class]="selectedOption()?.leadingClass ?? ''"
          >
            {{ selectedOption()?.leadingLabel }}
          </span>
        }
      </mhd-select-trigger>
    </span>
  </div>

  <div mhdDropdownPanel class="mhd-select-panel">
    @if (searchable()) {
      <div class="mhd-select-panel__search">
        <mhd-input
          label=""
          type="search"
          [placeholder]="searchPlaceholder()"
          [value]="searchValue()"
          leadingIcon="fa-magnifying-glass"
          (valueChange)="handleSearchChange($event)"
        />
      </div>
    }

    <div class="mhd-select-panel__list" role="listbox" aria-label="Select option">
      @for (option of filteredOptions(); track option.value) {
        <button
          type="button"
          class="mhd-select-option"
          [class.mhd-select-option--selected]="isSelected(option.value)"
          (click)="selectValue(option.value)"
        >
          <span class="mhd-select-option__main">
            @if (option.leadingLabel) {
              <span
                class="mhd-select__leading-badge"
                [class]="option.leadingClass ?? ''"
              >
                {{ option.leadingLabel }}
              </span>
            }

            <span class="mhd-select-option__content">
              <span class="mhd-select-option__label">{{ option.label }}</span>

              @if (option.description) {
                <span class="mhd-select-option__description">
                  {{ option.description }}
                </span>
              }
            </span>
          </span>

          <span
            class="mhd-select-option__radio"
            [class.mhd-select-option__radio--selected]="isSelected(option.value)"
            aria-hidden="true"
          ></span>
        </button>
      } @empty {
        <div class="mhd-select-panel__empty">No matching options</div>
      }
    </div>
  </div>
</mhd-dropdown>
