<div class="mhd-dropdown" cdkOverlayOrigin #origin="cdkOverlayOrigin">
  <div
    class="mhd-dropdown__trigger"
    (click)="handleTriggerClick($event)"
  >
    <ng-content select="[mhdDropdownTrigger]" />
  </div>
</div>

<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOrigin]="origin"
  [cdkConnectedOverlayOpen]="open()"
  [cdkConnectedOverlayPositions]="positions"
  [cdkConnectedOverlayHasBackdrop]="true"
  [cdkConnectedOverlayPush]="true"
  [cdkConnectedOverlayViewportMargin]="12"
  cdkConnectedOverlayBackdropClass="mhd-dropdown-backdrop"
  (attach)="handleOpen()"
  (detach)="handleDetach()"
  (backdropClick)="handleBackdropClick()"
>
  <div class="mhd-dropdown__panel" [style.min-width.px]="minWidth()">
    <ng-content select="[mhdDropdownPanel]" />
  </div>
</ng-template>
