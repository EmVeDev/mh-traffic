<div class="pill-select" [class.is-open]="open()" [style.--accent]="accent()">
  <button
    #trigger
    type="button"
    class="pill-trigger"
    [attr.aria-expanded]="open()"
    (click)="toggle()"
  >
    <span class="pill-label">{{ selectedLabel() }}</span>

    <span class="pill-icon" [class.open]="open()" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="18" height="18">
        <path
          d="M6.7 9.3a1 1 0 0 1 1.4 0L12 13.2l3.9-3.9a1 1 0 1 1 1.4 1.4l-4.6 4.6a1 1 0 0 1-1.4 0L6.7 10.7a1 1 0 0 1 0-1.4z"
          fill="currentColor"
        />
      </svg>
    </span>
  </button>

  @if (open()) {
    <div class="panel" role="listbox" [attr.aria-multiselectable]="multiple()">
      @for (opt of options(); track opt.value; let i = $index) {
        <button
          type="button"
          class="item"
          [class.active]="i === activeIndex()"
          [class.selected]="isSelected(opt)"
          [disabled]="opt.disabled"
          (click)="selectOption(opt)"
        >
  <span class="item-row">
    <span class="item-left">
      @if (opt.iconUrl) {
        <img
          class="item-icon"
          [src]="opt.iconUrl"
          alt=""
          aria-hidden="true"
        />
      }

      <span class="item-label">{{ opt.label }}</span>
    </span>

    @if (multiple() && isSelected(opt)) {
      <span class="check" aria-hidden="true">✓</span>
    }
  </span>
        </button>

      }
    </div>
  }
</div>
