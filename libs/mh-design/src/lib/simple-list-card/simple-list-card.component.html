<div class="list-card">
  <div class="list-card__header">
    <span>{{ title() }}</span>

    @if (linkLabel()) {
      <a href="#" class="list-card__link">{{ linkLabel() }}</a>
    }
  </div>

  <div class="list-card__body">
    @for (row of rows(); track $index) {
      <div class="list-row">
        <span class="list-row__value">{{ row.value }}</span>
        <a href="#" class="list-row__label">{{ row.label }}</a>
      </div>
    }
  </div>
</div>
