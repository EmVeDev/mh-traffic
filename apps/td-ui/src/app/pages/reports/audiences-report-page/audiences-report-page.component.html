<section class="report-page">
  <td-report-page-header
    [title]="'audiences report'"
    [siteLabel]="siteLabel()"
    [analysisTypeLabel]="analysisTypeLabel()"
    [selectedDateLabel]="selectedDateLabel()"
  />

  <div class="report-page__content">
    <td-report-toolbar
      [tokens]="toolbarTokens()"
      [middleLabel]="'performance by'"
    />

    <td-report-overview
      [title]="'How articles in <strong>audiences</strong> generates <strong>pageviews</strong>'"
      [leftGroups]="overviewLeftGroups()"
      [rightGroups]="overviewRightGroups()"
    />

    <td-report-table
      [title]="'How do <strong>audiences</strong> differ when broken down by <strong>main metrics</strong>'"
      [firstColumnHeader]="'audiences'"
      [columns]="tableColumns()"
      [rows]="tableRows()"
      [totals]="tableTotals()"
      [tableDisplayMode]="'table'"
    />
  </div>
</section>
