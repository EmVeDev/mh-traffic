<section class="report-subpage-header">
  <div class="report-subpage-header__top">
    <a class="report-subpage-header__back" [routerLink]="backRoute()">
      <mhd-icon icon="fa-chevron-left" iconSet="fas" size="text-xs"></mhd-icon>
      <span>{{ backLabel() }}</span>
    </a>
  </div>

  <div class="report-subpage-header__main">
    <div class="report-subpage-header__title-wrap">
      <h1 class="report-subpage-header__title">{{ title() }}</h1>
    </div>

    <div class="report-subpage-header__context">
      <button type="button" class="context-pill">
        <span class="context-pill__brand">N</span>
        <span>{{ siteLabel() }}</span>
        <mhd-icon icon="fa-chevron-down" iconSet="fas" size="text-xs"></mhd-icon>
      </button>

      <button type="button" class="context-pill context-pill--muted">
        <span>{{ analysisTypeLabel() }}</span>
      </button>

      <button type="button" class="context-pill">
        <span>{{ selectedDateLabel() }}</span>
        <mhd-icon icon="fa-chevron-down" iconSet="fas" size="text-xs"></mhd-icon>
      </button>
    </div>
  </div>
</section>
