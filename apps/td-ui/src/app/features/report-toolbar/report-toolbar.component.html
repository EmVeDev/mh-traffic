<section class="report-toolbar">
  <div class="report-toolbar__top">
    <div class="report-sentence">
      <!-- 🔴 leading label -->
      <span class="report-sentence__static">{{ leadingLabel() }}</span>

      <!-- metric -->
      <mhd-inline-select
        class="report-sentence__select"
        [options]="metricOptions()"
        [value]="selectedMetricValue()"
        label="Metric"
        (valueChange)="selectMetric($event)"
      />

      <span class="report-sentence__text">performance by</span>

      <!-- breakdown -->
      <mhd-inline-select
        class="report-sentence__select"
        [options]="breakdownOptions()"
        [value]="selectedBreakdownValue()"
        label="Breakdown"
        (valueChange)="selectBreakdown($event)"
      />
    </div>

    <div class="report-toolbar__actions">
      <mhd-button
        variant="secondary"
        size="sm"
        leadingIcon="fa-filter"
        trailingIcon="fa-chevron-down"
        [active]="advancedFiltersOpen()"
        (click)="filterToggle.emit()"
      >
        Filter
      </mhd-button>

      <mhd-dropdown
        [(open)]="shareDropdownOpen"
        position="bottom-end"
        [minWidth]="320"
      >
        <mhd-button
          mhdDropdownTrigger
          variant="secondary"
          size="sm"
          leadingIcon="fa-share-nodes"
          trailingIcon="fa-chevron-down"
        >
          Share
        </mhd-button>

        <div mhdDropdownPanel class="inline-menu share-menu">
          <div class="inline-menu__list">
            @for (option of shareGroups().share; track option.value) {
              <button
                type="button"
                class="inline-menu__option"
                (click)="selectShareAction(option.value)"
              >
                {{ option.label }}
              </button>
            }

            <div class="share-menu__divider"></div>

            @for (option of shareGroups().download; track option.value) {
              <button
                type="button"
                class="inline-menu__option"
                (click)="selectShareAction(option.value)"
              >
                {{ option.label }}
              </button>
            }
          </div>
        </div>
      </mhd-dropdown>
    </div>
  </div>
</section>
