<td-report-page-header
  [title]="title()"
  [sites]="siteOptions()"
  [selectedSiteValue]="selectedSiteValue()"
  [analysisTypeLabel]="analysisTypeLabel()"
  [selectedDateLabel]="selectedDateLabel()"
  [dateRangeValue]="dateRangeValue()"
  (siteSelected)="onSiteSelected($event)"
  (dateRangeValueChange)="onDateRangeValueChange($event)"
/>

<td-report-toolbar
  [leadingLabel]="resolvedToolbarLeadingLabel()"
  [analysisTypeLabel]="analysisTypeLabel()"
  [metricOptions]="metricOptions()"
  [selectedMetricValue]="selectedMetricValue()"
  [breakdownOptions]="breakdownOptions()"
  [selectedBreakdownValue]="selectedBreakdownValue()"
  [advancedFiltersOpen]="advancedFiltersOpen()"
  (metricSelected)="onMetricSelected($event)"
  (breakdownSelected)="onBreakdownSelected($event)"
  (filterToggle)="onFilterToggle()"
/>

@if (advancedFiltersOpen()) {
  <ng-content select="[filters]" />
}

<mhd-report-overview
  [title]="overviewTitle()"
  [leftGroups]="overviewLeftGroups()"
  [rightGroups]="overviewRightGroups()"
/>

<mhd-report-table
  [title]="tableTitle()"
  [firstColumnHeader]="firstColumnHeader()"
  [columns]="columns()"
  [rows]="rows()"
  [totals]="totals()"
  [tableDisplayMode]="tableDisplayMode()"
  [valueDisplayMode]="valueDisplayMode()">
  <div tableControls>
    @if (enableTableModeToggle() || enableValueModeToggle()) {
      <section class="report-page-shell__table-controls">
        @if (enableTableModeToggle()) {
          <div class="segmented-toggle" aria-label="Table display mode">
            <button
              type="button"
              class="segmented-toggle__option"
              title="Table"
              [class.segmented-toggle__option--active]="tableDisplayMode() === 'table'"
              (click)="setTableMode('table')"
            >
              <mhd-icon [icon]="'fa-table'"></mhd-icon>
            </button>

            <button
              type="button"
              class="segmented-toggle__option"
              title="Chart"
              [class.segmented-toggle__option--active]="tableDisplayMode() === 'chart'"
              (click)="setTableMode('chart')"
            >
              <mhd-icon [icon]="'fa-bar-chart'"></mhd-icon>
            </button>
          </div>
        }

        @if (enableValueModeToggle()) {
          <div class="segmented-toggle" aria-label="Value display mode">
            <button
              type="button"
              class="segmented-toggle__option"
              [class.segmented-toggle__option--active]="valueDisplayMode() === 'raw'"
              (click)="setValueMode('raw')"
            >
              <mhd-icon [icon]="'fa-hashtag'"></mhd-icon>
            </button>

            <button
              type="button"
              class="segmented-toggle__option"
              [class.segmented-toggle__option--active]="valueDisplayMode() === 'percentage'"
              (click)="setValueMode('percentage')"
            >
              <mhd-icon [icon]="'fa-percent'"></mhd-icon>
            </button>
          </div>
        }
      </section>
    }
  </div>
</mhd-report-table>
