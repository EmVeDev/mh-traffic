<header class="report-page-header">
  <div class="report-page-header__top">
    <h1 class="report-page-header__title">{{ title() }}</h1>

    <div class="report-page-header__controls">
      <mhd-select
        placeholder="Select site"
        [compact]="true"
        tone="accent"
        [minPanelWidth]="320"
        [options]="sites()"
        [value]="selectedSiteValue()"
        (valueChange)="onSiteSelected($event)"
      />

      <div class="report-page-header__date-group">
        <span class="report-page-header__analysis-pill">
          {{ analysisTypeLabel() }}
        </span>

        <mhd-date-range-select
          placeholder="Select date"
          [compact]="true"
          [minPanelWidth]="760"
          [value]="dateRangeValue()"
          (valueChange)="onDateRangeChanged($event)"
        />
      </div>
    </div>
  </div>

  <div class="report-page-header__divider"></div>
</header>
