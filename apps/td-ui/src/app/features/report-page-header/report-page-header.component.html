<header class="report-page-header">
  <div class="report-page-header__title-wrap">
    <h1 class="report-page-header__title">{{ title() }}</h1>
  </div>

  <div class="report-page-header__context">
    @if (usesLegacySiteLabel()) {
      @if (resolvedSiteLabel()) {
        <mhd-select-trigger
          [label]="resolvedSiteLabel()"
          [compact]="false"
          [chevron]="false"
          [disabled]="true"
          tone="accent"
        />
      }
    } @else {
      <mhd-select
        placeholder="Select site"
        tone="accent"
        [options]="siteSelectOptions()"
        [value]="selectedSiteValue()"
        (valueChange)="handleSiteValueChange($event)"
      />
    }

    @if (showAnalysisLabel()) {
      <mhd-select-trigger
        [label]="resolvedAnalysisLabel()"
        [compact]="false"
        [chevron]="false"
        [disabled]="true"
      />
    }

    @if (showDateLabel()) {
      @if (dateRangeValue()) {
        <mhd-date-range-select
          [value]="dateRangeValue()!"
          (valueChange)="handleDateRangeValueChange($event)"
        />
      } @else {
        <mhd-select-trigger
          [label]="resolvedDateLabel()"
          [compact]="false"
          [chevron]="true"
          [disabled]="true"
        />
      }
    }
  </div>
</header>
