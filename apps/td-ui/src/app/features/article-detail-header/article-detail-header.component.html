<section class="article-detail-header">
  <div class="article-detail-header__image-wrap">
    @if (imageUrl()) {
      <img class="article-detail-header__image" [src]="imageUrl()" [alt]="title()" />
    } @else {
      <div class="article-detail-header__image-placeholder">
        <mhd-icon icon="fa-image" iconSet="fas" />
      </div>
    }
  </div>

  <div class="article-detail-header__content">
    <div class="article-detail-header__title-row">
      <span class="site-badge">{{ siteBadge() }}</span>

      @if (articleUrl()) {
        <a
          class="article-detail-header__title-link"
          [href]="articleUrl()"
          target="_blank"
          rel="noopener noreferrer"
        >
          <h2 class="article-detail-header__title">{{ title() }}</h2>
        </a>
      } @else {
        <h2 class="article-detail-header__title">{{ title() }}</h2>
      }
    </div>

    <div class="article-detail-header__author-row">
      <mhd-icon icon="fa-user" iconSet="fas" size="text-sm" />
      <span>{{ author() }}</span>
    </div>

    <div class="article-detail-header__meta-chips">
      @for (chip of metaChips(); track trackChip($index, chip)) {
        <span class="meta-chip" [class]="'meta-chip--' + chip.tone">
          {{ chip.label }}
        </span>
      }
    </div>

    @if (tags().length) {
      <div class="article-detail-header__taxonomy">
        <mhd-icon icon="fa-tag" iconSet="fas" size="text-sm" />
        <span class="article-detail-header__taxonomy-text">{{ tagsLabel() }}</span>
      </div>
    }
  </div>
</section>
